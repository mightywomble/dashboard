<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Dashboard{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Improved font loading with fallbacks -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* Theme CSS Variables */
        :root {
            --bg-primary: #1a1a2e;
            --bg-secondary: #16213e;
            --bg-tertiary: #0f3460;
            --glass-bg: rgba(255, 255, 255, 0.08);
            --glass-hover: rgba(255, 255, 255, 0.12);
            --glass-border: rgba(255, 255, 255, 0.15);
            --glass-border-hover: rgba(255, 255, 255, 0.25);
            --text-primary: #e0e0e0;
            --text-secondary: #9CA3AF;
            --accent-primary: #8B5CF6;
            --accent-secondary: #3B82F6;
        }
        
        /* Bubble Gum Theme */
        [data-theme="bubblegum"] {
            --bg-primary: #ff6b9d;
            --bg-secondary: #c44569;
            --bg-tertiary: #f8b500;
            --glass-bg: rgba(255, 255, 255, 0.2);
            --glass-hover: rgba(255, 255, 255, 0.3);
            --glass-border: rgba(255, 255, 255, 0.4);
            --glass-border-hover: rgba(255, 255, 255, 0.6);
            --text-primary: #ffffff;
            --text-secondary: #f1f5f9;
            --accent-primary: #ff9ff3;
            --accent-secondary: #54a0ff;
        }
        
        /* Terminal Theme */
        [data-theme="terminal"] {
            --bg-primary: #0c0c0c;
            --bg-secondary: #1a1a1a;
            --bg-tertiary: #262626;
            --glass-bg: rgba(0, 255, 0, 0.1);
            --glass-hover: rgba(0, 255, 0, 0.2);
            --glass-border: rgba(0, 255, 0, 0.3);
            --glass-border-hover: rgba(0, 255, 0, 0.5);
            --text-primary: #00ff00;
            --text-secondary: #00cc00;
            --accent-primary: #00ff00;
            --accent-secondary: #ffff00;
        }
        
        /* Ocean Theme */
        [data-theme="ocean"] {
            --bg-primary: #1e3a8a;
            --bg-secondary: #1e40af;
            --bg-tertiary: #2563eb;
            --glass-bg: rgba(59, 130, 246, 0.15);
            --glass-hover: rgba(59, 130, 246, 0.25);
            --glass-border: rgba(59, 130, 246, 0.3);
            --glass-border-hover: rgba(59, 130, 246, 0.5);
            --text-primary: #dbeafe;
            --text-secondary: #93c5fd;
            --accent-primary: #3b82f6;
            --accent-secondary: #06d6a0;
        }
        
        /* Forest Theme */
        [data-theme="forest"] {
            --bg-primary: #064e3b;
            --bg-secondary: #065f46;
            --bg-tertiary: #047857;
            --glass-bg: rgba(16, 185, 129, 0.15);
            --glass-hover: rgba(16, 185, 129, 0.25);
            --glass-border: rgba(16, 185, 129, 0.3);
            --glass-border-hover: rgba(16, 185, 129, 0.5);
            --text-primary: #d1fae5;
            --text-secondary: #6ee7b7;
            --accent-primary: #10b981;
            --accent-secondary: #fbbf24;
        }
        
        /* Desert Theme */
        [data-theme="desert"] {
            --bg-primary: #78350f;
            --bg-secondary: #92400e;
            --bg-tertiary: #b45309;
            --glass-bg: rgba(245, 158, 11, 0.15);
            --glass-hover: rgba(245, 158, 11, 0.25);
            --glass-border: rgba(245, 158, 11, 0.3);
            --glass-border-hover: rgba(245, 158, 11, 0.5);
            --text-primary: #fef3c7;
            --text-secondary: #fcd34d;
            --accent-primary: #f59e0b;
            --accent-secondary: #ef4444;
        }
        
        /* Sunset Theme */
        [data-theme="sunset"] {
            --bg-primary: #7c2d12;
            --bg-secondary: #ea580c;
            --bg-tertiary: #fb923c;
            --glass-bg: rgba(251, 146, 60, 0.15);
            --glass-hover: rgba(251, 146, 60, 0.25);
            --glass-border: rgba(251, 146, 60, 0.3);
            --glass-border-hover: rgba(251, 146, 60, 0.5);
            --text-primary: #fed7aa;
            --text-secondary: #fdba74;
            --accent-primary: #fb923c;
            --accent-secondary: #ec4899;
        }
        
        /* Cloud Theme */
        [data-theme="cloud"] {
            --bg-primary: #f8fafc;
            --bg-secondary: #e2e8f0;
            --bg-tertiary: #cbd5e1;
            --glass-bg: rgba(71, 85, 105, 0.1);
            --glass-hover: rgba(71, 85, 105, 0.2);
            --glass-border: rgba(71, 85, 105, 0.2);
            --glass-border-hover: rgba(71, 85, 105, 0.4);
            --text-primary: #0f172a;
            --text-secondary: #475569;
            --accent-primary: #3b82f6;
            --accent-secondary: #8b5cf6;
        }
        
        /* Midnight Theme */
        [data-theme="midnight"] {
            --bg-primary: #0f0f23;
            --bg-secondary: #1a1a3a;
            --bg-tertiary: #2a2a4a;
            --glass-bg: rgba(139, 92, 246, 0.1);
            --glass-hover: rgba(139, 92, 246, 0.2);
            --glass-border: rgba(139, 92, 246, 0.2);
            --glass-border-hover: rgba(139, 92, 246, 0.4);
            --text-primary: #e0e7ff;
            --text-secondary: #a5b4fc;
            --accent-primary: #8b5cf6;
            --accent-secondary: #06d6a0;
        }
        
        /* Pastel Theme */
        [data-theme="pastel"] {
            --bg-primary: #fdf2f8;
            --bg-secondary: #fce7f3;
            --bg-tertiary: #fbcfe8;
            --glass-bg: rgba(236, 72, 153, 0.1);
            --glass-hover: rgba(236, 72, 153, 0.2);
            --glass-border: rgba(236, 72, 153, 0.2);
            --glass-border-hover: rgba(236, 72, 153, 0.4);
            --text-primary: #831843;
            --text-secondary: #be185d;
            --accent-primary: #ec4899;
            --accent-secondary: #3b82f6;
        }
        
        /* Vintage Theme */
        [data-theme="vintage"] {
            --bg-primary: #44403c;
            --bg-secondary: #57534e;
            --bg-tertiary: #6b7280;
            --glass-bg: rgba(161, 98, 7, 0.15);
            --glass-hover: rgba(161, 98, 7, 0.25);
            --glass-border: rgba(161, 98, 7, 0.3);
            --glass-border-hover: rgba(161, 98, 7, 0.5);
            --text-primary: #fef3c7;
            --text-secondary: #fcd34d;
            --accent-primary: #a16207;
            --accent-secondary: #dc2626;
        }
        
        /* Enhanced font loading with system fallbacks */
        * {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Helvetica Neue', Arial, sans-serif;
        }
        
        /* Custom glass effect with improved styling */
        .glass-card {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.37);
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
        }
        
        .glass-card:hover {
            background: rgba(255, 255, 255, 0.12);
            border: 1px solid rgba(255, 255, 255, 0.25);
            transform: translateY(-2px);
            box-shadow: 0 12px 40px 0 rgba(31, 38, 135, 0.45);
        }
        
        /* Improved click effects */
        a.glass-card:active {
            transform: translateY(0px) scale(0.98);
            transition: transform 0.1s ease;
        }
        
        /* Enhanced body styling */
        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            color: #e0e0e0;
            font-weight: 400;
            line-height: 1.6;
        }
        
        /* Form improvements */
        input, select, textarea {
            font-family: inherit !important;
        }
        
        /* Button hover improvements */
        button {
            font-family: inherit !important;
            transition: all 0.3s ease;
        }
        
        /* Prevent bouncing on form submission */
        .delete-form {
            display: inline-block;
        }
        
        .delete-form button {
            background: none;
            border: none;
            cursor: pointer;
            padding: 8px;
            border-radius: 6px;
            transition: all 0.2s ease;
        }
        
        .delete-form button:hover {
            background: rgba(239, 68, 68, 0.1);
            transform: scale(1.1);
        }
        
        .delete-form button:active {
            transform: scale(0.95);
        }
        
        /* Typography improvements */
        h1, h2, h3, h4, h5, h6 {
            font-weight: 600;
            line-height: 1.2;
            letter-spacing: -0.025em;
        }
        
        /* Loading spinner for better UX */
        .loading {
            opacity: 0.7;
            pointer-events: none;
        }
        
        /* Glass input styling */
        .glass-input {
            background: rgba(255, 255, 255, 0.05) !important;
            border: 1px solid rgba(255, 255, 255, 0.2) !important;
            color: white !important;
        }
        
        .glass-input:focus {
            background: rgba(255, 255, 255, 0.08) !important;
            border-color: rgba(59, 130, 246, 0.5) !important;
            outline: none;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
        }
        
        .glass-input::placeholder {
            color: rgba(255, 255, 255, 0.5);
        }
        
        /* Glass navigation buttons */
        .glass-nav-button {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 48px;
            height: 48px;
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 12px;
            color: rgba(255, 255, 255, 0.9);
            font-size: 18px;
            text-decoration: none;
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            box-shadow: 0 4px 16px 0 rgba(31, 38, 135, 0.25);
        }
        
        .glass-nav-button:hover {
            background: rgba(255, 255, 255, 0.15);
            border: 1px solid rgba(255, 255, 255, 0.25);
            color: white;
            transform: translateY(-2px) scale(1.05);
            box-shadow: 0 8px 24px 0 rgba(31, 38, 135, 0.4);
        }
        
        .glass-nav-button:active {
            transform: translateY(0px) scale(0.98);
            transition: transform 0.1s ease;
        }
        
        /* Special styling for logout button */
        .glass-nav-button.logout-btn:hover {
            background: rgba(239, 68, 68, 0.15);
            border-color: rgba(239, 68, 68, 0.3);
            color: #ff6b6b;
        }
        
        /* Responsive navigation */
        @media (max-width: 640px) {
            .glass-nav-button {
                width: 44px;
                height: 44px;
                font-size: 16px;
            }
            
            nav {
                padding: 1rem;
            }
            
            nav > div {
                gap: 0.5rem;
            }
        }
        
        /* Chat bubble styles */
        .glass-bubble-ai {
            background: rgba(147, 51, 234, 0.15);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 1px solid rgba(147, 51, 234, 0.3);
            border-radius: 12px 12px 12px 4px;
            padding: 12px 16px;
            max-width: 280px;
        }
        
        .glass-bubble-user {
            background: rgba(59, 130, 246, 0.15);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 1px solid rgba(59, 130, 246, 0.3);
            border-radius: 12px 12px 4px 12px;
            padding: 12px 16px;
            max-width: 280px;
            margin-left: auto;
        }
        
        .glass-message-ai {
            margin-bottom: 16px;
        }
        
        .glass-message-user {
            margin-bottom: 16px;
            display: flex;
            justify-content: flex-end;
        }
        
        /* Chat scrollbar styling */
        #chat-messages::-webkit-scrollbar {
            width: 4px;
        }
        
        #chat-messages::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 2px;
        }
        
        #chat-messages::-webkit-scrollbar-thumb {
            background: rgba(147, 51, 234, 0.5);
            border-radius: 2px;
        }
        
        #chat-messages::-webkit-scrollbar-thumb:hover {
            background: rgba(147, 51, 234, 0.7);
        }
    </style>
</head>
<body class="min-h-screen">
    <script>
        // Confirm delete function
        function confirmDelete(type, name) {
            return confirm(`Are you sure you want to delete this ${type}: "${name}"?`);
        }
        
        // Add loading state to forms
        document.addEventListener('DOMContentLoaded', function() {
            const forms = document.querySelectorAll('form');
            forms.forEach(form => {
                form.addEventListener('submit', function() {
                    const submitBtn = form.querySelector('button[type="submit"]');
                    if (submitBtn && !form.classList.contains('delete-form')) {
                        submitBtn.classList.add('loading');
                        submitBtn.disabled = true;
                        const originalText = submitBtn.textContent;
                        submitBtn.textContent = 'Loading...';
                        
                        // Re-enable after 3 seconds as fallback
                        setTimeout(() => {
                            submitBtn.classList.remove('loading');
                            submitBtn.disabled = false;
                            submitBtn.textContent = originalText;
                        }, 3000);
                    }
                });
            });
        });
    </script>
    
    <!-- Top Navigation Bar -->
    <nav class="fixed top-0 right-0 z-50 p-6">
        <div class="flex items-center space-x-3">
            {% if session.logged_in %}
                <!-- Home/Dashboard Icon -->
                <a href="{{ url_for('index') }}" class="glass-nav-button" title="Dashboard">
                    <i class="fas fa-home"></i>
                </a>
                <!-- Settings Icon -->
                <a href="{{ url_for('settings') }}" class="glass-nav-button" title="Settings">
                    <i class="fas fa-cog"></i>
                </a>
                <!-- Logout Icon -->
                <a href="{{ url_for('logout') }}" class="glass-nav-button logout-btn" title="Logout">
                    <i class="fas fa-sign-out-alt"></i>
                </a>
            {% else %}
                <!-- Login Icon -->
                <a href="{{ url_for('login') }}" class="glass-nav-button" title="Admin Login">
                    <i class="fas fa-user-shield"></i>
                </a>
            {% endif %}
        </div>
    </nav>
    
    <div class="container mx-auto px-4 py-8">
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="p-4 mb-4 text-sm text-white rounded-lg bg-{{ 'green' if category == 'success' else 'red' }}-500" role="alert">
                      <span class="font-medium">{{ message }}</span>
                    </div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        {% block content %}{% endblock %}
    </div>
</body>
</html>
